name: hms
# Docker Compose file for HMS with PostgreSQL and Timescale pg_textsearch
# docker compose -f deploy/containers/docker-compose/pg_textsearch/docker-compose.yaml down && sleep 2 && docker compose -f deploy/containers/docker-compose/pg_textsearch/docker-compose.yaml up -d
# Make sure to set the required environment variables before running:
# - HMS_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the hms service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - HMS_VERSION: HMS application version (default: latest)
# - HMS_DB_USER: PostgreSQL user (default: hms_user)
# - HMS_DB_NAME: PostgreSQL database name (default: hms_db)

services:
  db:
    # Use custom PostgreSQL image with pgvector and pg_textsearch extensions
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-db
    restart: always
    # Expose PostgreSQL port
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: ${HMS_DB_USER:-hms_user}
      POSTGRES_PASSWORD: ${HMS_DB_PASSWORD:-hms_password}
      POSTGRES_DB: ${HMS_DB_NAME:-hms_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - hms-net

  pg-textsearch-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      - PGPASSWORD=${HMS_DB_PASSWORD:-hms_password}
    command: >
      bash -c "
        echo 'Waiting for PostgreSQL to be ready...';
        until pg_isready -h hms-db -p 5432 -U hms_user; do
          echo 'PostgreSQL is unavailable - sleeping';
          sleep 2;
        done;
        echo 'PostgreSQL is ready - creating hms_db database';
        psql -h hms-db -p 5432 -U hms_user -c 'CREATE DATABASE hms_db;' 2>/dev/null || echo 'Database already exists';
        echo 'Creating extensions in hms_db database';
        psql -h hms-db -p 5432 -U hms_user -d hms_db -c 'CREATE EXTENSION IF NOT EXISTS vector CASCADE;';
        psql -h hms-db -p 5432 -U hms_user -d hms_db -c 'CREATE EXTENSION IF NOT EXISTS pg_textsearch CASCADE;';
        echo 'Database and extensions created successfully';
      "
    restart: "no"
    networks:
      - hms-net

  hms:
    image: ghcr.io/hms-memory/hms:${HMS_VERSION:-latest}
    container_name: hms-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      # LLM Configuration
      HMS_API_LLM_PROVIDER: ${HMS_API_LLM_PROVIDER:-openai}
      HMS_API_LLM_API_KEY: ${OPENAI_API_KEY:-your-api-key}

      # Database Configuration
      HMS_API_DATABASE_URL: postgresql://${HMS_DB_USER:-hms_user}:${HMS_DB_PASSWORD:-hms_password}@db:5432/${HMS_DB_NAME:-hms_db}

      # Vector and Text Search Extensions
      HMS_API_VECTOR_EXTENSION: pgvector
      HMS_API_TEXT_SEARCH_EXTENSION: pg_textsearch

    depends_on:
      - db
    networks:
      - hms-net


networks:
  hms-net:
    driver: bridge

volumes:
  pg_data:
