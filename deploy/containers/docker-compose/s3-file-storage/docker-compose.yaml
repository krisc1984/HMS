# Docker Compose file for HMS with S3 file storage (SeaweedFS)
#
# SeaweedFS (Apache 2.0) provides an S3-compatible object storage backend
# for storing uploaded files instead of PostgreSQL BYTEA storage.
#
# Make sure to set the required environment variables before running:
# - HMS_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the hms service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - HMS_VERSION: HMS application version (default: latest)
# - HMS_DB_USER: PostgreSQL user (default: hms_user)
# - HMS_DB_NAME: PostgreSQL database name (default: hms_db)
# - HMS_DB_VERSION: PostgreSQL version (default: 18)
# - SEAWEEDFS_S3_ACCESS_KEY: S3 access key (default: hms_s3_key)
# - SEAWEEDFS_S3_SECRET_KEY: S3 secret key (default: hms_s3_secret)

services:
  db:
    image: pgvector/pgvector:pg${HMS_DB_VERSION:-18}
    container_name: hms-db
    restart: always
    environment:
      POSTGRES_USER: ${HMS_DB_USER:-hms_user}
      POSTGRES_PASSWORD: ${HMS_DB_PASSWORD:?Please set the HMS_DB_PASSWORD env variable}
      POSTGRES_DB: ${HMS_DB_NAME:-hms_db}
    volumes:
      - pg_data:/var/lib/postgresql/${HMS_DB_VERSION:-18}/docker
    networks:
      - hms-net

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: hms-seaweedfs
    restart: always
    # Single-node mode: master + volume + filer + S3 gateway all in one process
    command: >
      server
      -s3
      -s3.port=8333
      -s3.config=/etc/seaweedfs/s3.json
      -ip.bind=0.0.0.0
    volumes:
      - seaweedfs_data:/data
      - ./s3.json:/etc/seaweedfs/s3.json:ro
    # Expose S3 API port (uncomment to access from host)
    # ports:
    #   - "8333:8333"
    networks:
      - hms-net

  hms:
    image: ghcr.io/hms-memory/hms:${HMS_VERSION:-latest}
    container_name: hms-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - HMS_API_LLM_API_KEY=${OPENAI_API_KEY?Please set the OPENAI_API_KEY env variable}
      - HMS_API_DATABASE_URL=postgresql://${HMS_DB_USER:-hms_user}:${HMS_DB_PASSWORD:?Please set the HMS_DB_PASSWORD env variable}@db:5432/${HMS_DB_NAME:-hms_db}
      # S3 file storage configuration (SeaweedFS)
      - HMS_API_FILE_STORAGE_TYPE=s3
      - HMS_API_FILE_STORAGE_S3_BUCKET=hms
      - HMS_API_FILE_STORAGE_S3_ENDPOINT=http://seaweedfs:8333
      - HMS_API_FILE_STORAGE_S3_REGION=us-east-1
      - HMS_API_FILE_STORAGE_S3_ACCESS_KEY_ID=${SEAWEEDFS_S3_ACCESS_KEY:-hms_s3_key}
      - HMS_API_FILE_STORAGE_S3_SECRET_ACCESS_KEY=${SEAWEEDFS_S3_SECRET_KEY:-hms_s3_secret}
    depends_on:
      - db
      - seaweedfs
    networks:
      - hms-net

networks:
  hms-net:
    driver: bridge

volumes:
  pg_data:
  seaweedfs_data:
