name: hms
# Docker Compose file for HMS with Timescale extensions
# - pgvectorscale: DiskANN vector search (disk-based, scalable)
# - pg_textsearch: BM25 text search (high-performance keyword retrieval)
#
# Quick start:
# docker compose -f deploy/containers/docker-compose/timescale/docker-compose.yaml up -d --build
#
# Required environment variables:
# - HMS_DB_PASSWORD: Password for the PostgreSQL user
# - OPENAI_API_KEY (or configure another LLM provider)
#
# Optional environment variables with defaults:
# - HMS_VERSION: HMS application version (default: latest)
# - HMS_DB_USER: PostgreSQL user (default: hms_user)
# - HMS_DB_NAME: PostgreSQL database name (default: hms_db)

services:
  db:
    # Custom PostgreSQL image with Timescale extensions (pgvectorscale + pg_textsearch)
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-db-timescale
    restart: always
    # Expose PostgreSQL port (using 5438 to avoid conflicts with other setups)
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: ${HMS_DB_USER:-hms_user}
      POSTGRES_PASSWORD: ${HMS_DB_PASSWORD:-hms_password}
      POSTGRES_DB: ${HMS_DB_NAME:-hms_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - hms-net
    # Health check to ensure database is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescale-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGPASSWORD=${HMS_DB_PASSWORD:-hms_password}
    command: >
      bash -c "
        echo 'PostgreSQL is ready - creating hms_db database';
        psql -h hms-db-timescale -p 5432 -U hms_user -c 'CREATE DATABASE hms_db;' 2>/dev/null || echo 'Database already exists';
        echo 'Installing Timescale extensions...';
        echo '1/3: Installing pgvector (required by pgvectorscale)...';
        psql -h hms-db-timescale -p 5432 -U hms_user -d hms_db -c 'CREATE EXTENSION IF NOT EXISTS vector CASCADE;';
        echo '2/3: Installing pgvectorscale (DiskANN vector search)...';
        psql -h hms-db-timescale -p 5432 -U hms_user -d hms_db -c 'CREATE EXTENSION IF NOT EXISTS vectorscale CASCADE;';
        echo '3/3: Installing pg_textsearch (BM25 text search)...';
        psql -h hms-db-timescale -p 5432 -U hms_user -d hms_db -c 'CREATE EXTENSION IF NOT EXISTS pg_textsearch CASCADE;';
        echo '';
        echo '✅ Timescale extensions installed successfully';
        echo '';
        echo 'Installed extensions:';
        psql -h hms-db-timescale -p 5432 -U hms_user -d hms_db -c \"\\dx\" | grep -E '(vector|vectorscale|pg_textsearch)';
      "
    restart: "no"
    networks:
      - hms-net

  hms:
    image: ghcr.io/hms-memory/hms:${HMS_VERSION:-latest}
    container_name: hms-app-timescale
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      # LLM Configuration
      HMS_API_LLM_PROVIDER: ${HMS_API_LLM_PROVIDER:-openai}
      HMS_API_LLM_API_KEY: ${OPENAI_API_KEY:-your-api-key}

      # Database Configuration
      HMS_API_DATABASE_URL: postgresql://${HMS_DB_USER:-hms_user}:${HMS_DB_PASSWORD:-hms_password}@db:5432/${HMS_DB_NAME:-hms_db}

      # Timescale Extensions
      # pgvectorscale: DiskANN algorithm for disk-based scalable vector search
      HMS_API_VECTOR_EXTENSION: pgvectorscale
      # pg_textsearch: High-performance BM25 text search
      HMS_API_TEXT_SEARCH_EXTENSION: pg_textsearch

    depends_on:
      db:
        condition: service_healthy
      timescale-init:
        condition: service_completed_successfully
    networks:
      - hms-net


networks:
  hms-net:
    driver: bridge

volumes:
  pg_data:
