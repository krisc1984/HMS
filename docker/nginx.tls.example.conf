events {}

http {
  log_format vendor_json escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request",'
    '"status":$status,"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,"upstream_response_time":"$upstream_response_time"}';

  access_log /var/log/nginx/access.log vendor_json;
  error_log /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=vendor_gateway:10m rate=10r/s;

  upstream hms_vendor_gateway {
    server hms-vendor-gateway:18081;
    keepalive 32;
  }

  server {
    listen 80;
    server_name hms.your-domain.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name hms.your-domain.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 5m;
    proxy_read_timeout 650s;
    proxy_send_timeout 650s;
    proxy_connect_timeout 10s;

    # Optional production allowlist:
    # allow 203.0.113.10;
    # deny all;

    location = /health {
      proxy_pass http://hms_vendor_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      limit_req zone=vendor_gateway burst=30 nodelay;

      proxy_pass http://hms_vendor_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
