name = "hms-oauth-proxy"
main = "src/index.ts"
compatibility_date = "2025-03-01"
# Production deployments should publish to a custom route, not the
# workers.dev subdomain. Flip to `true` only for local/dev previews.
workers_dev = false

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "your-kv-namespace-id"

[vars]
HMS_ORIGIN = "https://your-hms-origin.example.com"

[[routes]]
pattern = "hms.yourdomain.com/*"
zone_name = "yourdomain.com"

# Secrets (set via `npx wrangler secret put`):
# - SESSION_SECRET (password for the login page)
# - PROXY_SECRET (header value for WAF rule on origin)
# - HMS_API_TOKEN (Bearer token for HMS API)
# - ALLOWED_EMAIL (your email, used as the OAuth user ID)
